run_id: research-example
mode: research

task:
  title: Research example
  description: >
    Read the provided context and produce a concise research summary.
  workspace: /workspace

model:
  provider: openai_compatible
  model: gpt-5
  api_base: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY

agent_env:
  path: /workspace/.agent

runtime:
  image: zagent-runtime:local
  workdir: /workspace
  max_turns: 12
  final_marker: ZAGENT_DONE

tools:
  builtin:
    - shell
    - files
    - web_search
  custom: []
  enable_mcp: false

policy:
  network: restricted
  git_push: false
  writable_paths:
    - /workspace
