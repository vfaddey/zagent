run_id: fastapi-app-smoke
mode: task

task:
  title: Create a minimal FastAPI application
  description: >
    Create a small FastAPI project in the workspace. Add a pyproject.toml
    with FastAPI, Uvicorn, pytest, and httpx dependencies. Implement an
    application package with a health endpoint at GET /health returning
    {"status": "ok"} and a root endpoint at GET / returning a short JSON
    message. Add pytest coverage for both endpoints using FastAPI TestClient.
    Run formatting or tests when available, and finish with a concise summary
    of created files and verification results.
  workspace: /workspace

model:
  provider: openai_compatible
  model: gemma4:e4b
  api_base: http://10.139.2.217:11435/v1
  api_key_env: OLLAMA_API_KEY

agent_env:
  path: /workspace/.agent

runtime:
  image: zagent-runtime:local
  workdir: /workspace
  max_turns: 20
  final_marker: ZAGENT_DONE

tools:
  builtin:
    - shell
    - files
  custom: []
  enable_mcp: false

policy:
  network: restricted
  git_push: false
  writable_paths:
    - /workspace
