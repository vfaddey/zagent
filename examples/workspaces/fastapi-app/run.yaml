run_id: fastapi-app-smoke
mode: task

task:
  title: Создать FastAPI приложение для учета книг
  description: >
    Создай небольшое, но осмысленное FastAPI приложение для хранения книг в
    SQLite. Перед началом обязательно прочитай файл .agent/skills/python.md и
    следуй указанным там правилам проектирования.

    Требования к предметной области:
    - приложение хранит книги в одной SQLite таблице books;
    - у книги должны быть поля id, title, author, year;
    - реализуй создание книги, получение списка книг, получение книги по id и
      health endpoint;
    - для отсутствующей книги возвращай корректный HTTP 404.

    Требования к архитектуре:
    - пиши по Clean Architecture и SOLID;
    - раздели domain, application и infrastructure/presentation слои;
    - бизнес-логика не должна зависеть от FastAPI или SQLite;
    - работа с SQLite должна быть спрятана за repository interface;
    - не усложняй решение лишними абстракциями сверх задачи.

    Требования к проекту:
    - добавь pyproject.toml с зависимостями FastAPI, Uvicorn, pytest и httpx;
    - добавь тесты через FastAPI TestClient;
    - тесты должны покрывать health endpoint, создание книги, список книг,
      получение книги по id и 404 для неизвестной книги;
    - используй временную SQLite базу или изолированное тестовое хранилище,
      чтобы тесты были повторяемыми;
    - запусти доступные проверки или тесты.

    В финальном ответе обязательно укажи:
    - что файл .agent/skills/python.md был прочитан;
    - какие файлы созданы или изменены;
    - какие проверки были запущены и с каким результатом.
  workspace: /workspace

model:
  provider: openai_compatible
  model: gemma4:e4b
  api_base: http://10.139.2.217:11435/v1
  api_key_env: OLLAMA_API_KEY

agent_env:
  path: /workspace/.agent

runtime:
  image: zagent-runtime:local
  workdir: /workspace
  max_turns: 50
  final_marker: ZAGENT_DONE

tools:
  builtin:
    - shell
    - files
  custom: []
  enable_mcp: false

policy:
  network: restricted
  git_push: false
  writable_paths:
    - /workspace
