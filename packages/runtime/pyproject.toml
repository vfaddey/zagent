[project]
name = "zagent-runtime"
version = "0.1.7"
description = "Container runtime for ZAgent."
readme = "README.md"
authors = [
    { name = "vfaddey", email = "vfaddey@yandex.ru" },
]
requires-python = ">=3.12,<3.14"
dependencies = [
    "ag2[openai,mcp]>=0.11.5,<0.12",
    "dishka>=1.6,<2",
    "pydantic>=2.10",
    "pyyaml>=6.0",
    "typer>=0.15",
]

[project.scripts]
zagent-runtime = "zagent_runtime.presentation.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zagent_runtime"]
