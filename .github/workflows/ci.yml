name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Lint with Ruff
        run: uv run --all-packages ruff check .

      - name: Type check with Mypy
        run: uv run --all-packages mypy packages/runtime/src packages/launcher/src

      - name: Run tests with Pytest
        run: |
          uv run --package zagent-launcher pytest packages/launcher -q
          uv run --package zagent-runtime pytest packages/runtime -q
